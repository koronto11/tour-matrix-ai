server {
    listen 80;
    server_name your-domain.com;  # 改成你的域名或IP

    # 官网
    location /website {
        proxy_pass http://127.0.0.1:3000;
    }

    # 后台
    location /admin {
        proxy_pass http://127.0.0.1:3000;
    }

    # API
    location /api {
        proxy_pass http://127.0.0.1:3000;
    }

    # 根路径跳转到官网
    location = / {
        return 302 /website;
    }
}